{% extends "base.html" %}

{% block title %}Modifier Client | Web CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <section class="panel">
      <div class="panel-head">Modifier le client #{{ client.id }}</div>
      <div class="panel-body">
        <form action="/update/{{ client.id }}" method="POST" class="d-grid gap-3">
          <div>
            <label class="form-label fw-semibold">Nom</label>
            <input class="form-control" name="nom" value="{{ client.nom }}" required>
          </div>
          <div>
            <label class="form-label fw-semibold">Email</label>
            <input class="form-control" name="email" value="{{ client.email }}" type="email" required>
          </div>
          <div class="d-flex justify-content-between">
            <a class="btn btn-outline-secondary" href="/">Retour</a>
            <button class="btn btn-brand" type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>
{% endblock %}
